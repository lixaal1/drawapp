<!doctype html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrawApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape shape-a" aria-hidden="true"></div>
  <div class="bg-shape shape-b" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="hero">
      <p class="eyebrow">Loov tooriist</p>
      <h1>DrawApp</h1>
      <p class="subtitle">Joonista hiirega voi puuteplaadiga ning vaheta varve ja pintsli suurust.</p>
    </header>

    <section class="panel controls-panel" aria-label="Joonistamise juhtnupud">
      <div class="field-row">
        <label for="colorPicker">Varv</label>
        <input id="colorPicker" type="color" value="#ff5d3f" />
      </div>
      <div class="field-row">
        <label for="brushSize">Pintsli suurus</label>
        <input id="brushSize" type="range" min="1" max="40" value="8" />
        <output id="brushSizeValue">8 px</output>
      </div>
      <div class="button-row">
        <button id="clearCanvasBtn" type="button">Puhasta louend</button>
        <button id="saveDrawingBtn" type="button" class="accent">Salvesta galeriisse</button>
      </div>
    </section>

    <section class="panel canvas-panel" aria-label="Joonistusala">
      <canvas id="drawingCanvas" width="900" height="500"></canvas>
      <p id="statusText" class="status-text" role="status" aria-live="polite"></p>
    </section>

    <section class="panel gallery-panel" aria-label="Salvestatud joonistuste galerii">
      <div class="gallery-header">
        <h2>Galerii</h2>
      </div>
      <div id="gallery" class="gallery-grid"></div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
